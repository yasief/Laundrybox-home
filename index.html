		/* ════════════════════════════════════════════════════════════

		/* Section anchors the absolutely-positioned card. Slick's own

		.HeroNewSection {

		.HeroSlider.heroFixedCardActive .heroSliderContent {
			display: none !important;
		}

		/* ── Stationary card overlay (sibling of the slider) ── */
		.HeroNewSection .heroCard {

		/* Title, text and buttons fade together as one unit so nothing
		   flickers independently during the per-slide text swap. */
		.HeroNewSection .heroCardTitle,
		.HeroNewSection .heroCardText,
		.HeroNewSection .heroCardBtns {
			transition: opacity 200ms ease;

										collect your items 24/7 easily and without having to connect with anyone.
										Otherwise you can use our home pick up and delivery service by placing your
										orders on the mobile app or calling us on 800 5269. This app can be used for
										both home pick up and delivery users as well as smart locker users. You can
										always select and change your user profile in the My Accounts tab.</p>

								<div class="accContent">
									<p class="pb-10 pt-10"></p>
									<p>Absolutely, we are all about making your life easy and hassle free by giving you
										the ability to now take care of all your errands in one go without ever having
										to talk to anyone, go anywhere or deal with multiple vendors. Mybox is your one
										stop shop for all your errands. You can place your orders at the same time but
										each order will have various delivery times according to the service(s)

									<p>Delivery times are communicated according to the service(s) required. Please note

									<p>You can track the progress of your order on the app or by logging into mybox.net.
